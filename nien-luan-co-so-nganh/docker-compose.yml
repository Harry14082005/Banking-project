version: '3.8'

services:


  # DATABASE
  db:
    image: postgres:15
    container_name: payment_db
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: payment_system
      POSTGRES_PASSWORD: password
      # Phải khớp với application.properties:
      # spring.datasource.url=jdbc:postgresql://localhost:5432/payment_system
      # spring.datasource.username=user
      # spring.datasource.password=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Giữ data khi restart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payment_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5


  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # Spring Boot (chạy ngoài Docker) kết nối qua localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # QUAN TRỌNG: 2 listener
      # - PLAINTEXT://localhost:9092    → dành cho Spring Boot chạy NGOÀI Docker
      # - PLAINTEXT_INTERNAL://kafka:29092 → dành cho Flink chạy TRONG Docker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   # Tự tạo topic nếu chưa có
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5


  # FLINK JOB MANAGER - "Não" của Flink cluster
  # Nhận JAR, phân phối task cho TaskManager

  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8081:8081"   # Web UI: http://localhost:8081
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-port: 8081
    depends_on:
      kafka:
        condition: service_healthy


  # Xu ly du lieu
  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        # numberOfTaskSlots: số luồng xử lý song song
        # Đồ án để 2 là đủ


  # REDIS - Lưu idempotency keys (chống xử lý trùng GD)

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==========================================
# VOLUMES - Lưu data PostgreSQL không bị mất khi restart
# ==========================================
volumes:
  postgres_data: