spring.application.name=nien-luan-co-so-nganh

# ==========================================
# DATABASE - PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_system?sslmode=disable
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# VIRTUAL THREADS - Java 21
# ==========================================
spring.threads.virtual.enabled=true

# ==========================================
# KAFKA PRODUCER
# ==========================================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ==========================================
# KAFKA CONSUMER
# ==========================================
spring.kafka.consumer.group-id=fraud-detection-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ==========================================
# SERVER
# ==========================================
server.port=8080
# ==========================================
# REDIS - Idempotency Key Storage
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=your_password   # b? comment n?u Redis c? password

# TTL cho idempotency key (gi?) ? sau 24h key t? x?a
idempotency.ttl-hours=24

# ==========================================
# AI FRAUD DETECTION SERVICE (Python FastAPI)
# ==========================================
ai.service.url=http://localhost:8000/api/score

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# JWT SECURITY CONFIG
# ==========================================
app.jwtSecret=ChuyenGiaoDichNganHangThongMinhSeDuocThucHienBoiChuMeoMayDenTuTuongLai2026
app.jwtExpirationMs=86400000
# 1 ngay (1000*60*60*24)